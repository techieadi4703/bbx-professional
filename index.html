<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  Primary SEO                                        -->
    <!-- ═══════════════════════════════════════════════════ -->
    <title>BuildBazaarX – Design, Build & Source Raw Materials Online</title>
    <meta name="description" content="BuildBazaarX is India's all-in-one construction marketplace. Discover premium home designs, hire verified professionals, and source quality raw materials — fast." />
    <meta name="keywords" content="home interior design, construction marketplace, raw materials supplier, hire professionals India, building materials, interior designers online, construction platform" />
    <meta name="author" content="BuildBazaarX" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#131B2E" />
    <link rel="canonical" href="https://buildbazaarx.com/" />

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  Favicon                                            -->
    <!-- ═══════════════════════════════════════════════════ -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  Open Graph (WhatsApp, LinkedIn, Facebook)          -->
    <!-- ═══════════════════════════════════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://buildbazaarx.com/" />
    <meta property="og:site_name" content="BuildBazaarX" />
    <meta property="og:title" content="BuildBazaarX – Design, Build & Source Raw Materials Online" />
    <meta property="og:description" content="India's all-in-one construction marketplace. Discover premium home designs, hire verified professionals, and source quality raw materials — fast." />
    <meta property="og:image" content="https://buildbazaarx.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:locale" content="en_IN" />

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  Twitter / X Card                                   -->
    <!-- ═══════════════════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@BuildBazaarX" />
    <meta name="twitter:creator" content="@BuildBazaarX" />
    <meta name="twitter:title" content="BuildBazaarX – Design, Build & Source Raw Materials Online" />
    <meta name="twitter:description" content="India's all-in-one construction marketplace. Designs, skilled workers & raw materials — one platform." />
    <meta name="twitter:image" content="https://buildbazaarx.com/og-image.png" />

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  Performance                                        -->
    <!-- ═══════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking font load for Inter, Lora, and Space Mono (BuildBazaarX brand fonts) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" /></noscript>
    <link rel="dns-prefetch" href="https://supabase.co" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
